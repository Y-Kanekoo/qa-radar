target-version = "py311"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
    "C4",  # flake8-comprehensions
    "PTH", # flake8-use-pathlib
    "TID", # flake8-tidy-imports
]
ignore = [
    "E501",   # line-too-long: フォーマッタが扱う
    "RUF001", # 全角文字曖昧性: 日本語コメント想定でOFF
    "RUF002", # 同上 (docstring)
    "RUF003", # 同上 (comment)
]

[lint.per-file-ignores]
"tests/*" = ["B011"]
"scripts/*" = ["T201"] # print使用許可

[lint.isort]
known-first-party = ["qa_radar"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
