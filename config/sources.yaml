# qa-radar ソースリスト（30本、Day1版）
#
# スキーマ:
#   slug:       一意ID (snake_case 推奨、DB の sources.slug に保存)
#   name:       表示名
#   feed_url:   RSS / Atom / JSON Feed URL
#   site_url:   サイトトップ
#   language:   ja | en
#   category:   tool | blog | community | paper | note
#   enabled:    クローラーが取り込むか
#   fetch_policy:
#     min_interval_seconds:   再取得の最小間隔（DDoS抑止）
#     max_items_per_fetch:    1回の取得で読む上限
#   license_note:             利用規約上の集約可否についてのメモ
#
# 全URLは 2026-05-09 時点で実物確認済み（WebFetch にて 200 応答 + 直近3〜6ヶ月の活動確認）。
# 追加・変更時は CONTRIBUTING.md の手順に従ってください。

version: 1

sources:

